################################################################################
# Hyprland Configuration — Polished Edition
# Clean, optimized, and themed for your Catppuccin / Mocha setup
################################################################################

# ===============================================================
# VARIABLES
# ===============================================================
$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun

# ===============================================================
# AUTOSTART
# ===============================================================
exec-once = uwsm finalize

# Start gnome-keyring for secret service (prevents app delays waiting for keyring)
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11

exec-once = systemctl --user start pipewire pipewire-pulse wireplumber
exec-once = systemctl --user start hyprpolkitagent

exec-once = hyprctl setcursor Vimix-cursors 24
exec-once = hyprpaper
exec-once = ~/.config/hypr/scripts/bing_wallpaper.sh

exec-once = hyprsunset
exec-once = hypridle
exec-once = clipse
exec-once = /home/alextrebs/Workspace/wayle/target/release/wayle panel start

exec-once = ~/.config/hypr/scripts/claude_personality_gen/gen.sh

exec-once = [workspace special:tilde silent] alacritty -e ~/.local/bin/auto_tmux.sh
exec-once = discord
exec-once = spotify-launcher
exec-once = steam

exec-once = asusctl leds set low

exec-once = ~/.local/bin/update_all.sh
exec-once = ~/.local/bin/dock-toggle.sh

# ===============================================================
# ENVIRONMENT VARIABLES
# ===============================================================
env = XCURSOR_THEME,Vimix-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Vimix Cursors
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GL_YIELD,NOTHING
env = GBM_BACKEND,nvidia-drm
env = XDG_SESSION_TYPE,wayland

# ===============================================================
# LOOK & FEEL
# ===============================================================
general {
    gaps_in = 1
    gaps_out = 1
    border_size = 1
    layout = dwindle

    col.active_border = rgba(658676ee) rgba(4F6858ee) 45deg
    col.inactive_border = rgba(28342cee)

    resize_on_border = false
    allow_tearing = true
}

decoration {
    rounding = 6
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.98

    shadow {
        enabled = true
        range = 6
        render_power = 3
        color = rgba(0d0c09dd)
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = true

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}


misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 0
}

debug {
    vfr = false
}

group {
    groupbar {
        render_titles = false
        height = 0
        gradients = false
        keep_upper_gap = false
    }
}

monitor = eDP-1, 2560x1600@240, 0x0, 1.33
monitor = , highres, auto-right, 1

# unscale XWayland
xwayland {
  force_zero_scaling = true
}

# ===============================================================
# INPUT
# ===============================================================
input {
    kb_layout = gb
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
        tap-to-click = yes
        disable_while_typing=true
    }
}

# ===============================================================
# PER-DEVICE KEYBOARD LAYOUTS
# ===============================================================

# Built-in ASUS laptop keyboard — UK
device {
    name = asus-keyboard
    kb_layout = gb
    kb_options =
}

# NuPhy Air75 V2 via dongle — US ANSI
device {
    name = nordic-semiconductor-nuphy-air75-v2-dongle-keyboard
    kb_layout = us
    kb_options =
}

# NuPhy Air75 V2 via USB cable — US ANSI
# Run `hyprctl devices | grep -i nuphy` while plugged in to get exact name
device {
    name = nuphy-nuphy-air75-v2-keyboard
    kb_layout = us
    kb_options =
}

gesture = 3, horizontal, workspace

# ===============================================================
# KEYBINDS
# ===============================================================
$mainMod = SUPER

# System
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, ESCAPE, exit
bind = $mainMod, L, exec, hyprlock

# Terminal tab navigation (for grouped terminals)
bind = $mainMod, bracketleft, changegroupactive, b
bind = $mainMod, bracketright, changegroupactive, f
bind = ALT, 1, changegroupactive, 1
bind = ALT, 2, changegroupactive, 2
bind = ALT, 3, changegroupactive, 3
bind = ALT, 4, changegroupactive, 4
bind = ALT, 5, changegroupactive, 5
bind = ALT, 6, changegroupactive, 6
bind = ALT, 7, changegroupactive, 7
bind = ALT, 8, changegroupactive, 8
bind = ALT, 9, changegroupactive, 9

# Special workspaces
bind = ALT, Tab, togglespecialworkspace, tilde
bind = $mainMod, grave, togglespecialworkspace, tilde
bind = $mainMod SHIFT, grave, movetoworkspace, special:tilde

# Layout & Window Management
bind = $mainMod, A, togglegroup
bind = $mainMod SHIFT, A, moveoutofgroup
bind = $mainMod, F, togglefloating
bind = $mainMod, M, togglespecialworkspace, spotify
bind = $mainMod SHIFT, M, movetoworkspace, special:spotify
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

binde = $mainMod CTRL, left, workspace, m-1 
binde = $mainMod CTRL, right, workspace, m+1

bind = $mainMod, H, togglespecialworkspace, hotswap
bind = $mainMod SHIFT, H, movetoworkspace, special:hotswap

# Mouse navigation
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

# Apps
bind = $mainMod, T, exec, $terminal -e ~/.local/bin/auto_tmux.sh
bind = $mainMod SHIFT, T, exec, $terminal 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, Z, exec, zen-browser
bind = $mainMod SHIFT, equal, exec, ~/.config/hypr/scripts/scale_monitor.sh up
bind = $mainMod SHIFT, minus, exec, ~/.config/hypr/scripts/scale_monitor.sh down
bind = $mainMod, W, exec, tasks
bind = $mainMod, C, exec, ~/.local/bin/zed
bind = $mainMod, N, exec, obsidian

bind = $mainMod, D, togglespecialworkspace, discord
bind = $mainMod SHIFT, D, movetoworkspace, special:discord
bind = $mainMod CTRL, D, exec, discord
bind = $mainMod, G, togglespecialworkspace, steam
bind = $mainMod SHIFT, G, movetoworkspace, special:steam
bind = $mainMod CTRL, G, exec, steam
bind = $mainMod CTRL, M, exec, spotify-launcher

# Utilities
bind = $mainMod, S, exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/full_screenshot.sh
bind = $mainMod, F7, exec, hyprctl hyprsunset temperature -100
bind = $mainMod, F8, exec, hyprctl hyprsunset temperature +100
bind = $mainMod, F9, exec, ~/.config/hypr/scripts/toggle_touchpad_typing.sh
bind = $mainMod, F10, exec, ~/.local/bin/asus_power_button.sh
bind = $mainMod, F11, exec, ~/.local/bin/g16-power.sh
bind = $mainMod, F12, exec, ~/.local/bin/dock-toggle.sh

bind = $mainMod SHIFT, R, exec, ~/.config/hypr/scripts/screen_record.sh

bind = $mainMod, M,       exec, pw-metadata -n settings 0 clock.force-quantum 128
bind = $mainMod SHIFT, M, exec, pw-metadata -n settings 0 clock.force-quantum 0

# Media / Brightness
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86KbdBrightnessDown, exec, asusctl leds prev
bindel = , XF86KbdBrightnessUp, exec, asusctl leds next

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ===============================================================
# WINDOW RULES
# ===============================================================
windowrule = suppress_event maximize, match:class .*

windowrule {
    name = zen-pip
    match:class = ^(zen)$
    match:initial_title = ^(Picture-in-Picture)$
    float = on
    pin = on
    size = 640 360
    min_size = 320 180
    max_size = 1280 720
    keep_aspect_ratio = on
    suppress_event = maximize fullscreen
}

windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false
windowrule = workspace special:spotify silent, match:class ^(Spotify)$
windowrule = workspace special:discord silent, match:class ^(discord)$
windowrule = workspace special:steam silent, match:class ^(steam)$
windowrule = immediate true, match:class ^(steam_app_730)$

