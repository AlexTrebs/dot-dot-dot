name: Build Custom Arch ISO

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git rsync base-devel

      - name: Build ISO
        run: |
          set -e
          mkdir -p iso_build
          cp -r /usr/share/archiso/configs/releng iso_build/
          rm -rf iso_build/releng/airootfs/etc/skel || true
          mkdir -p iso_build/releng/airootfs/etc/skel/.config
          rsync -av .config/ iso_build/releng/airootfs/etc/skel/.config/
          rsync -av .local/ iso_build/releng/airootfs/etc/skel/.local/
          cp install.sh iso_build/releng/airootfs/etc/skel/install.sh
          cp symlink_config.sh iso_build/releng/airootfs/etc/skel/symlink_config.sh
          mkdir -p iso_build/releng/airootfs/root
          cp archinstall.yaml iso_build/releng/airootfs/root/archinstall.yaml
          cp README.md iso_build/releng/airootfs/etc/skel/README.md

          cd iso_build/releng
          mkdir -p work out
          mkarchiso -v -w work -o out .

          echo "Build completed. Contents of out/:"
          ls -lah out/

      - name: Upload ISO artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: arch-iso
          path: iso_build/releng/out/*.iso

  release:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download built ISO
        uses: actions/download-artifact@v4
        with:
          name: arch-iso
          path: iso_output

      - name: Verify ISO presence
        run: |
          echo "Verifying ISO download..."
          ls -lah iso_output

      - name: Create new Git tag
        id: tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch --tags
          LATEST_TAG=$(git tag --list "V*" | sort -V | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_NUM=1
          else
            NEXT_NUM=$(( ${LATEST_TAG#V} + 1 ))
          fi
          NEW_TAG="V$NEXT_NUM"
          echo "Creating new tag: $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload ISO
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Arch ISO ${{ steps.tag.outputs.tag }}"
          body: "Automated build of custom Arch ISO."
          files: iso_output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
